{% extends "base.html" %}
{% block title %}Edit Contact — OpTracker{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <a href="{{ url_for('companies') }}" class="btn btn--ghost btn--sm mb-1">← Back</a>
        <h1>Edit Contact</h1>
        <p class="subtitle">{{ contact.fullname }}</p>
    </div>
</div>

<div class="card form-card">
    <form method="POST" action="{{ url_for('edit_contact', contact_id=contact.contactid) }}" id="editContactForm">
        <div class="form-group">
            <label class="form-label" for="fullname">Full Name *</label>
            <input type="text" name="fullname" id="fullname" class="form-input" required value="{{ contact.fullname }}">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input type="email" name="email" id="email" class="form-input" value="{{ contact.email or '' }}">
            </div>
            <div class="form-group">
                <label class="form-label" for="phone">Phone</label>
                <input type="tel" name="phone" id="phone" class="form-input" value="{{ contact.phone or '' }}">
            </div>
        </div>
        <div class="form-group">
            <label class="form-label" for="linkedin">LinkedIn URL</label>
            <input type="url" name="linkedin" id="linkedin" class="form-input" value="{{ contact.linkedinurl or '' }}">
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn--primary">Save Changes</button>
            <a href="{{ url_for('companies') }}" class="btn btn--secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
