{% extends "base.html" %}
{% block title %}Add Contact — OpTracker{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <a href="{{ url_for('companies') }}" class="btn btn--ghost btn--sm mb-1">← Back</a>
        <h1>Add Contact</h1>
        <p class="subtitle">Save a professional contact</p>
    </div>
</div>

<div class="card form-card">
    <form method="POST" action="{{ url_for('new_contact') }}" id="newContactForm">
        <div class="form-group">
            <label class="form-label" for="fullname">Full Name *</label>
            <input type="text" name="fullname" id="fullname" class="form-input" required placeholder="e.g. Sarah Chen">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input type="email" name="email" id="email" class="form-input" placeholder="name@company.com">
            </div>
            <div class="form-group">
                <label class="form-label" for="phone">Phone</label>
                <input type="tel" name="phone" id="phone" class="form-input" placeholder="415-555-0101">
            </div>
        </div>
        <div class="form-group">
            <label class="form-label" for="linkedin">LinkedIn URL</label>
            <input type="url" name="linkedin" id="linkedin" class="form-input" placeholder="https://linkedin.com/in/…">
        </div>
        <div class="form-group">
            <label class="form-label" for="company_id">Company *</label>
            <select name="company_id" id="company_id" class="form-select" required>
                <option value="">Select a company…</option>
                {% for c in companies %}
                <option value="{{ c.companyid }}">{{ c.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn--primary" id="btn-submit-contact">Add Contact</button>
            <a href="{{ url_for('companies') }}" class="btn btn--secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
