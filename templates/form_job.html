{% extends "base.html" %}
{% block title %}Add Job Posting — OpTracker{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <a href="{{ url_for('company_detail', company_id=company.companyid) }}" class="btn btn--ghost btn--sm mb-1">← Back to {{ company.name }}</a>
        <h1>New Job Posting</h1>
        <p class="subtitle">Add a role at {{ company.name }}</p>
    </div>
</div>

<div class="card form-card">
    <form method="POST" action="{{ url_for('new_job', company_id=company.companyid) }}" id="newJobForm">
        <div class="form-group">
            <label class="form-label" for="title">Job Title *</label>
            <input type="text" name="title" id="title" class="form-input" required placeholder="e.g. Software Engineer Intern">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label class="form-label" for="location">Location *</label>
                <input type="text" name="location" id="location" class="form-input" required placeholder="e.g. Remote">
            </div>
            <div class="form-group">
                <label class="form-label" for="salary">Salary Range</label>
                <input type="text" name="salary" id="salary" class="form-input" placeholder="e.g. $140K-180K">
            </div>
        </div>
        <div class="form-group">
            <label class="form-label" for="description">Description</label>
            <textarea name="description" id="description" class="form-textarea" placeholder="Paste or write the job description…"></textarea>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label class="form-label" for="date_posted">Date Posted</label>
                <input type="date" name="date_posted" id="date_posted" class="form-input">
            </div>
            <div class="form-group">
                <label class="form-label" for="deadline">Application Deadline</label>
                <input type="date" name="deadline" id="deadline" class="form-input">
            </div>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn--primary" id="btn-submit-job">Add Posting</button>
            <a href="{{ url_for('company_detail', company_id=company.companyid) }}" class="btn btn--secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
