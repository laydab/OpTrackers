{% extends "base.html" %}
{% block title %}Edit Application — OpTracker{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <a href="{{ url_for('application_detail', app_id=app.appid) }}" class="btn btn--ghost btn--sm mb-1">← Back</a>
        <h1>Edit Application</h1>
        <p class="subtitle">{{ app.jobtitle }} — {{ app.company_name }}</p>
    </div>
</div>

<div class="card form-card">
    <form method="POST" action="{{ url_for('edit_application', app_id=app.appid) }}" id="editAppForm">
        <div class="form-row">
            <div class="form-group">
                <label class="form-label" for="status">Status</label>
                <select name="status" id="status" class="form-select">
                    {% for s in ['Draft','Submitted','Interview','Offer','Rejected'] %}
                    <option value="{{ s }}" {% if s == app.status %}selected{% endif %}>{{ s }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label class="form-label" for="submission_date">Submission Date</label>
                <input type="date" name="submission_date" id="submission_date" class="form-input"
                       value="{{ app.submissiondate.isoformat() if app.submissiondate else '' }}">
            </div>
        </div>
        <div class="form-group">
            <label class="form-label" for="offer_deadline">Offer Deadline</label>
            <input type="date" name="offer_deadline" id="offer_deadline" class="form-input"
                   value="{{ app.offerdeadline.isoformat() if app.offerdeadline else '' }}">
            <div class="form-hint">Set if you've received an offer with a response deadline.</div>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn--primary" id="btn-save-app">Save Changes</button>
            <a href="{{ url_for('application_detail', app_id=app.appid) }}" class="btn btn--secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
