{% extends "base.html" %}
{% block title %}Edit Job Posting — OpTracker{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <a href="{{ url_for('company_detail', company_id=company.companyid) }}" class="btn btn--ghost btn--sm mb-1">← Back</a>
        <h1>Edit Job Posting</h1>
        <p class="subtitle">{{ company.name }}</p>
    </div>
</div>

<div class="card form-card">
    <form method="POST" action="{{ url_for('edit_job', company_id=company.companyid, posting_id=posting.postingid) }}" id="editJobForm">
        <div class="form-group">
            <label class="form-label" for="title">Job Title *</label>
            <input type="text" name="title" id="title" class="form-input" required value="{{ posting.jobtitle }}">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label class="form-label" for="location">Location *</label>
                <input type="text" name="location" id="location" class="form-input" required value="{{ posting.location }}">
            </div>
            <div class="form-group">
                <label class="form-label" for="salary">Salary Range</label>
                <input type="text" name="salary" id="salary" class="form-input" value="{{ posting.salaryrange or '' }}">
            </div>
        </div>
        <div class="form-group">
            <label class="form-label" for="description">Description</label>
            <textarea name="description" id="description" class="form-input" rows="3">{{ posting.description or '' }}</textarea>
        </div>
        <div class="form-group">
            <label class="form-label" for="deadline">Application Deadline</label>
            <input type="date" name="deadline" id="deadline" class="form-input"
                   value="{{ posting.applicationdeadline.isoformat() if posting.applicationdeadline else '' }}">
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn--primary" id="btn-save-job">Save Changes</button>
            <a href="{{ url_for('company_detail', company_id=company.companyid) }}" class="btn btn--secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
