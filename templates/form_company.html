{% extends "base.html" %}
{% block title %}Add Company — OpTracker{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <a href="{{ url_for('companies') }}" class="btn btn--ghost btn--sm mb-1">← Back</a>
        <h1>Add Company</h1>
        <p class="subtitle">Register a new target company</p>
    </div>
</div>

<div class="card form-card">
    <form method="POST" action="{{ url_for('new_company') }}" id="newCompanyForm">
        <div class="form-group">
            <label class="form-label" for="name">Company Name *</label>
            <input type="text" name="name" id="name" class="form-input" required placeholder="e.g. Stripe">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label class="form-label" for="location">Location</label>
                <input type="text" name="location" id="location" class="form-input" placeholder="e.g. San Francisco, CA">
            </div>
            <div class="form-group">
                <label class="form-label" for="website">Website</label>
                <input type="url" name="website" id="website" class="form-input" placeholder="https://…">
            </div>
        </div>
        <div class="form-group">
            <label class="form-label" for="industries">Industries</label>
            <input type="text" name="industries" id="industries" class="form-input" placeholder="FinTech, Payments">
            <div class="form-hint">Comma-separated list of industries.</div>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn--primary" id="btn-submit-company">Add Company</button>
            <a href="{{ url_for('companies') }}" class="btn btn--secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
